<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <path id="tArc" d="M 44,256 a 212,212 0 0,1 424,0"/>
    <path id="bArc" d="M 44,272 a 212,212 0 0,0 424,0"/>
  </defs>

  <!-- background -->
  <circle cx="256" cy="256" r="256" fill="#080d1a"/>
  <!-- rings -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#1e3a8a" stroke-width="5"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="#2563eb" stroke-width="3"/>
  <circle cx="256" cy="256" r="172" fill="#0c1a35"/>
  <circle cx="256" cy="256" r="172" fill="none" stroke="#60a5fa" stroke-width="6"/>

  <!-- cart (left side) -->
  <path d="M118,290 L118,248 L188,248 L182,290 Z" fill="none" stroke="#93c5fd" stroke-width="8" stroke-linejoin="round"/>
  <line x1="104" y1="248" x2="122" y2="248" stroke="#93c5fd" stroke-width="8" stroke-linecap="round"/>
  <line x1="104" y1="248" x2="92" y2="216" stroke="#93c5fd" stroke-width="8" stroke-linecap="round"/>
  <circle cx="136" cy="308" r="12" fill="#60a5fa"/>
  <circle cx="172" cy="308" r="12" fill="#60a5fa"/>

  <!-- transform arrow -->
  <line x1="198" y1="268" x2="228" y2="268" stroke="#60a5fa" stroke-width="7" stroke-linecap="round" marker-end="url(#arr)"/>

  <!-- rising bars (right side) -->
  <rect x="238" y="278" width="28" height="40" rx="5" fill="#1d4ed8"/>
  <rect x="276" y="252" width="28" height="66" rx="5" fill="#3b82f6"/>
  <rect x="314" y="220" width="28" height="98" rx="5" fill="#60a5fa"/>
  <rect x="352" y="192" width="28" height="126" rx="5" fill="#93c5fd"/>

  <!-- up arrow above tallest bar -->
  <polyline points="366,182 366,158 350,174" fill="none" stroke="#bfdbfe" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="366" y1="158" x2="382" y2="174" stroke="#bfdbfe" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- arc text top -->
  <text font-family="Arial,sans-serif" font-size="28" font-weight="600" fill="#60a5fa" letter-spacing="6">
    <textPath href="#tArc" startOffset="12%">CONVERT SPENDING</textPath>
  </text>
  <!-- arc text bottom -->
  <text font-family="Arial,sans-serif" font-size="28" font-weight="600" fill="#60a5fa" letter-spacing="6">
    <textPath href="#bArc" startOffset="23%">INTO EARNING</textPath>
  </text>

  <!-- cardinal dots -->
  <circle cx="256" cy="44" r="7" fill="#3b82f6"/>
  <circle cx="256" cy="468" r="7" fill="#3b82f6"/>
  <circle cx="44" cy="256" r="7" fill="#3b82f6"/>
  <circle cx="468" cy="256" r="7" fill="#3b82f6"/>
</svg>
